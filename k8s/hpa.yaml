apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vibecheck-api-hpa
  namespace: vibecheck
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vibecheck-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vibecheck-web-hpa
  namespace: vibecheck
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vibecheck-web
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
