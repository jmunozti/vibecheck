global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "vibecheck-api"
    static_configs:
      - targets: ["vibecheck-api.vibecheck.svc.cluster.local:5001"]
    metrics_path: /metrics

  - job_name: "vibecheck-web"
    static_configs:
      - targets: ["vibecheck-web.vibecheck.svc.cluster.local:3000"]
    metrics_path: /metrics

  - job_name: "postgres-exporter"
    static_configs:
      - targets: ["postgres-exporter.vibecheck.svc.cluster.local:9187"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
